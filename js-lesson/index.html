<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>👧Day 80 & 81 & 82 JS基礎 ☕️実力にあったUdemy教材発見</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  </head>
  <body>
    <div class="background-photo"></div>

    <div class="dynamic-gradient"></div>

    <main class="content">
      <h1>👧Day 80 & 81 & 82 JS基礎</h1>
      <p id="result">
        ☕️実力にあったUdemy教材発見<br />
        おさらい含むJavaScriptに突入
      </p>
      <!-- ここからボタン -->
      <form id="message-form">
        <input type="text" name="result" id="textBox" placeholder="何か入力してね" />
        <button id="button" type="submit">入力内容を追加</button>
        <!-- <input id="button" type="button" value="入力内容を追加"> -->
      </form>
      <!-- ここからボタン２ -->

      <ul id="list"></ul>
      <ul>
        <li id="oldList">古い要素</li>
      </ul>
      <input id="button2" type="button" value="置き換え！" />
      <!-- ここからボタン３ -->
      <ul id="list3">
        <li>要素１</li>
        <li>要素２</li>
        <li>要素３</li>
        <li>要素４</li>
        <li>要素５</li>
      </ul>
      <input id="button3" type="button" value="削除！" />

      <input id="button4" type="button" value="クリック！" />

      <h2>jsのソースコードの下のほうを見てね</h2>
      <pre id="code-display" class="language-javascript"></pre>
    </main>

    <div class="controls">
      <div class="control-item">
        <button id="toggle-color">色の変化</button>
        <span id="mode-name" style="color: white; font-size: 14px; margin-left: 10px">サイケデリック</span>

        <label style="margin-left: 20px">Speed変化：</label>
        <input type="range" id="speedRange" min="1" max="30" value="15" step="1" />
      </div>
    </div>

    <script>
      const slider = document.getElementById('speedRange');
      const root = document.documentElement;
      slider.addEventListener('input', (e) => {
        root.style.setProperty('--bg-speed', `${31 - e.target.value}s`);
      });

      // 3パターンの色を配列に格納
      const patterns = [
        {
          name: 'カフェ',
          c1: 'rgba(44, 26, 18, 0.4)',
          c2: 'rgba(141, 64, 36, 0.1)',
          c3: 'rgba(224, 122, 95, 0.3)',
          c4: 'rgba(61, 44, 37, 0.9)',
        },
        {
          name: 'スタバ',
          c1: 'rgba(0, 112, 74, 0.7)',
          c2: 'rgba(30, 57, 50, 0.8)',
          c3: 'rgba(255, 255, 255, 0.4)',
          c4: 'rgba(0, 168, 98, 0.6)',
        },
        {
          name: 'サイケ',
          c1: 'rgba(255, 0, 255, 0.9)',
          c2: 'rgba(0, 255, 255, 0.7)',
          c3: 'rgba(57, 255, 20, 0.7)',
          c4: 'rgba(255, 255, 0, 0.7)',
        },
      ];
      let currentPattern = 2; // 現在どのパターンか管理するインデックス
      const tglBtn = document.getElementById('toggle-color');
      const modeText = document.getElementById('mode-name'); // テキスト表示用

      tglBtn.addEventListener('click', () => {
        // 次のパターンへ進む（3の次は0に戻る）
        currentPattern = (currentPattern + 1) % patterns.length;

        const p = patterns[currentPattern];

        // 1. CSS変数を一気に書き換える
        root.style.setProperty('--c1', p.c1);
        root.style.setProperty('--c2', p.c2);
        root.style.setProperty('--c3', p.c3);
        root.style.setProperty('--c4', p.c4);
        // 2. ボタン横のテキストを変える
        modeText.textContent = p.name;
      });
    </script>
    <script type="module" src="./main.js" defer charset="utf-8"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  </body>
</html>
