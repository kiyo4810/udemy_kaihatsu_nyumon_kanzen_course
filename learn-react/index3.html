<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React入門 Props（index3.html）</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="text/babel" data-type="module">
      import React from 'https://esm.sh/react@19.1.0/?dev';
      import ReactDOMClient from 'https://esm.sh/react-dom@19.1.0/client/?dev';
      // console.log(React.version);
      const domNode = document.getElementById('app');
      const root = ReactDOMClient.createRoot(domNode);

      // 子コンポーネント
      // Reactでは引数はオブジェクトとして渡されるので以下の{}で囲む
      function ShowProfileInfo({ name, age }) {
        // console.log(name);
        // console.log(age);
        return (
          <div>
            {/* 以下 {}波括弧の中はJSのコードである*/}
            <p>名前：{name}</p>
            <p>年齢：{age}歳</p>
            <p>{age >= 16 ? 'お酒が飲めます' : 'お酒が飲めません'}</p>
            <hr />
          </div>
        );
      }

      // 親コンポーネント
      function App() {
        return (
          <div>
            <h1>３人分のデータをHTMLで直打ち Ver</h1>
            {/* 文字列は""で囲み、数字や変数は{}で囲む。{}の中はJSである！ */}
            <ShowProfileInfo name="山田太郎" age={15} />
            <ShowProfileInfo name="椎名一" age={16} />
            <ShowProfileInfo name="加藤優" age={17} />
          </div>
        );
      }
      // コンポーネントDomにレンダリングをする処理
      root.render(<App />);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </body>
</html>
