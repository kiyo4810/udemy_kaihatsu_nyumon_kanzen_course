<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module">
      import React from 'https://esm.sh/react@19.1.0/?dev';
      import ReactDOMClient from 'https://esm.sh/react-dom@19.1.0/client/?dev';
      // console.log(React.version);
      const domNode = document.getElementById('app');
      const root = ReactDOMClient.createRoot(domNode);

      const count = 7;
      function getItemMessage(count) {
        if (count === 0) {
          return <p>アイテムがありません</p>;
        } else if (count > 0) {
          return <p>{count}個のアイテムがあります</p>;
        } else {
          return <p>個数の情報が正しくありません</p>;
        }
      }

      const element = (
        <div>
          <h1>アイテム一覧</h1>
          {getItemMessage(count)}
        </div>
      );
      root.render(element);
    </script>
  </body>
</html>
