<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React入門（index2.html）</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="text/babel" data-type="module">
      import React from 'https://esm.sh/react@19.1.0/?dev';
      import ReactDOMClient from 'https://esm.sh/react-dom@19.1.0/client/?dev';
      // console.log(React.version);
      const domNode = document.getElementById('app');
      const root = ReactDOMClient.createRoot(domNode);
      //Headerコンポーネントを定義してそれを画面に表示する
      // Reactコンポーネントは関数で定義してHTMLやJSと区別するために頭文字を大文字に
      function Header() {
        // 関数の中のreturnでJSXを返却。クォートでは囲みません
        return (
          <>
            <header>
              <Title />
              <Navigation />
            </header>
          </>
        );
      }
      function Title() {
        return <h1>Top Page</h1>;
      }
      function Navigation() {
        return (
          <nav>
            <a href="http://yahoo.com">Yahoo.com</a> | <a href="http://Google.com">Google.com</a>
          </nav>
        );
      }
      function Content() {
        return (
          <>
            <Article />
          </>
        );
      }
      function Article() {
        return (
          <article>
            <h2>ようこそ</h2>
            <p>ここはメインコンテンツが入ります</p>
          </article>
        );
      }
      function Footer() {
        return <small>&copy; 2026 Goma Pan Clinic</small>;
      }
      function HomePage() {
        return (
          <div>
            <Header />
            <Content />
            <Footer />
          </div>
        );
      }
      root.render(<HomePage />);

      // function Main(){
      //   return <main>コンテンツの中身だよ</main>;
      // }
      // そのままrootを書き足したらHeaderがMainに上書きされる
      // root.render(<Main />);
      // 複数で表示する場合
      // root.render(
      //   <>
      //     <Header />
      //     <Main/>

      //   </>,
      // );
      // root.render(<h2>Hello, React Dom!!</h2>);
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </body>
</html>
